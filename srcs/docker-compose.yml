networks:
  inception:
    driver: bridge

volumes:
  mariadb:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${USER}/data/mariadb

  wordpress:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${USER}/data/wordpress

secrets:
  db_root_password:
    file: ../secrets/db_root_password.txt
  db_password:
    file: ../secrets/db_password.txt
  wp_admin_password:
    file: ../secrets/wp_admin_password.txt
  wp_user_password:
    file: ../secrets/wp_user_password.txt
  redis_password:
    file: ../secrets/redis_password.txt

services:

  mariadb:
    image: mariadb
    build:
      context: requirements/mariadb
      dockerfile: Dockerfile
    container_name: mariadb
    networks:
      - inception
    volumes:
      - mariadb:/var/lib/mysql
    env_file:
      - .env
    secrets:
      - db_root_password
      - db_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  wordpress:
    image: wordpress
    build:
      context: requirements/wordpress
      dockerfile: Dockerfile
    container_name: wordpress
    networks:
      - inception
    volumes:
      - wordpress:/var/www/html
    env_file:
      - .env
    secrets:
      - wp_admin_password
      - wp_user_password
      - db_password
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/9000"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  nginx:
    image: nginx
    build:
      context: requirements/nginx
      dockerfile: Dockerfile
    container_name: nginx
    networks:
      - inception
    volumes:
      - wordpress:/var/www/html
    ports:
      - "443:443"
    env_file:
      - .env
    depends_on:
      wordpress:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis
    build:
      context: requirements/bonus/redis
      dockerfile: Dockerfile
    container_name: redis
    networks:
      - inception
    secrets:
      - redis_password
    restart: unless-stopped

  adminer:
    image: adminer
    build:
      context: requirements/bonus/adminer
      dockerfile: Dockerfile
    container_name: adminer
    networks:
      - inception
    ports:
      - "8080:8080"
    restart: unless-stopped

  bonus-site:
    image: bonus-site
    build:
      context: requirements/bonus/static-site
      dockerfile: Dockerfile
    container_name: bonus-site
    networks:
      - inception
    ports:
      - "8081:80"
    restart: unless-stopped